<!DOCTYPE html>
<html>

<head>
    <title>Student Notes Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #333;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        h2 {
            color: #444;
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        button {
            background: #333;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #555;
        }

        .notes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .note-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 4px;
            background: #f9f9f9;
        }

        .note-card h3 {
            margin-top: 0;
            color: #333;
        }

        .note-card .subject {
            color: #666;
            font-style: italic;
            margin: 5px 0;
        }

        .note-card .date {
            font-size: 0.9em;
            color: #888;
            margin: 5px 0;
        }

        .note-card .description {
            margin: 10px 0;
        }

        .note-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .note-actions button {
            flex: 1;
            padding: 5px;
            font-size: 0.9em;
        }

        .edit-form {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
        }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Student Notes Manager</h1>

        <div id="message"></div>

        <h2>Add New Note</h2>
        <form id="addNoteForm">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject:</label>
                <input type="text" id="subject" required>
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" required></textarea>
            </div>
            <button type="submit">Add Note</button>
        </form>

        <h2>My Notes</h2>
        <button onclick="loadNotes()">Refresh Notes</button>
        <div id="notesContainer" class="notes-list"></div>
    </div>

    <script src="app.js"></script>
</body>

</html>
